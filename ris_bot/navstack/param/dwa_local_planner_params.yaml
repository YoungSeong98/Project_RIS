DWAPlannerROS:

# Robot Configuration Parameters
  max_vel_x: 0.1 
  #min_vel_x: -0.2
  min_vel_x: -0.02
  
  max_vel_y: 0.0      # y related parameters should be zero in diffrenetial robot   
  min_vel_y: 0.0

  max_vel_trans:  0.1
  min_vel_trans:  0.0 

  max_vel_theta: 0.1
  min_vel_theta: 0.0
  

  acc_lim_x: 1.0
  acc_lim_y: 0.0
  acc_lim_theta: 1.0  

# Goal Tolerance Parameters
  xy_goal_tolerance: 0.1 
  yaw_goal_tolerance: 0.05 
  latch_xy_goal_tolerance: false 

# Forward Simulation Parameters
  sim_time: 10.0  

  use_sim_time: true    # Time to make trajectory
  sim_granularity: 0.3   
  vx_samples: 10       
  vy_samples: 0         # Only for omni wheel
  vth_samples: 20       
  controller_frequency: 10.0      # 
  penalize_negative_x: true

# Trajectory Scoring Parameters
  path_distance_bias: 32.0 
  #goal_distance_bias: 20.0
  goal_distance_bias: 24.0 
  #occdist_scale: 0.02
  occdist_scale: 0.02 
  forward_point_distance: 0.5     # 0.0
  stop_time_buffer: 10.0  
  scaling_speed: 0.25  
  max_scaling_factor: 0.3 

# Oscillation Prevention Parameters
  oscillation_reset_dist: 0.05 

# Debugging
  publish_traj_pc : true
  publish_cost_grid_pc: true
  
  holonomic_robot: false
